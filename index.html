


<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBI測定</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center min-h-screen p-4">
<div class="bg-red-800 rounded-lg shadow p-8 w-full maz-w-md">
    <hi class="text-2xl font-bold mb-6">MBI測定</hi>

    <div class="mb-4">
    <label class="block text-sm font medium text-blackbmb-1">身長(cm)</label>
<input id="height" type="number" placeholder="例:170" class="w-full border border-gray-300 rounded px-3 py-2">
</div>


<div class="mb-6"[>
    <label class="block text-sm font medium text black mb-1">体重(kg)</label>
<input id="weight" type="number" placeholder="例:65" class="w-full border border-gray-300 rounded px-3 py-2">
</div>
<button id="calcBtn" class="w-full bg-gray-600 text-white font-bold text-gray-800">計算</button>
<p id="result" class="mt-6 text-center text-lg font-bold text-gray-800"></p>
</div>

<script>
    function calcBmi(height,weight) {
        const heightM = height / 100;
       return weight / (heightM * heightM);
    }

    function getJudgement (bmi) {
        if (bmi < 18.5) {
            return "痩せ型";
        } else if (bmi < 25) {
        return "普通";
        } else {
            return "肥満";
        }
    }
const button = document.querySelector("#calcBtn");
const result = document.querySelector("#result");

button.addEventListener("click", () => {
    const height = Number(document.querySelector("#height").value);
    const weight = Number(document.querySelector("#weight").value);

    if (height <= 0 || weight <= 0) {
        result.textContent = "身長と体重を入力してください"
        return
    }
    const bmi = calcBmi(height, weight);
    const judgement = getJudgement(bmi);
    result.textContent = "BMI: " + bmi.toFixed(1) +" ("+ judgement + ")";
});
</script>

</body>
</html>
